<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>NexusTraffic | My Reports</title>

<!-- Distinctive type stack: Bricolage Grotesque (display) + Figtree (body) + JetBrains Mono (data) -->
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Figtree:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@300,0&display=swap" rel="stylesheet"/>

<link href="../../css/user/reports.css" rel="stylesheet"/>

</head>

<body>

<!-- ══════════════════════════════════════════════════
     NAVBAR
     ══════════════════════════════════════════════════ -->
<nav class="navbar">
  <div class="navbar-left">
    <div class="brand">
      <div class="brand-mark">
        <span class="material-symbols-outlined">traffic</span>
      </div>
      <span class="brand-name">NexusTraffic</span>
    </div>
    <nav class="nav-links">
      <a href="#" class="nav-link">Home</a>
      <a href="#" class="nav-link active">My Reports</a>
      <a href="#" class="nav-link">Alerts</a>
      <a href="#" class="nav-link">Profile</a>
    </nav>
  </div>

  <div class="navbar-right">
    <div class="search-wrap">
      <span class="material-symbols-outlined search-icon-el">search</span>
      <input class="search-input" type="text" placeholder="Search incidents…" />
    </div>
    <div class="divider-v"></div>
    <button class="icon-btn">
      <span class="material-symbols-outlined">notifications</span>
      <span class="notif-dot"></span>
    </button>
    <button class="theme-btn" id="theme-toggle" aria-label="Toggle theme">
      <span class="material-symbols-outlined" id="theme-icon">light_mode</span>
    </button>
    <div class="user-avatar">
      <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuDEjevRVLuYByNoqxLQvD6KtQyp3_J1CH-konNTattLwHJoLNkSQ_YFugHsLE9d9YMBFRMuIYxNMMfJzpFftJH2zwOH7vHH0lgHyfp-3qhFMxb5wvio5dJiZjn6_OItZu4bH1M0XTq3edeHsAfMNyoxeNGTJyBH5fK8O2RXX6liykIRXzub652oYl0gSzPGAkCD9muhqRdmoZTsTWeF7tu_OE2IXVJR4nqDo7xCfXLpRvx_h3DkZzTXja64guQbs3M0yam5jRYn5zo" alt="User Avatar" />
    </div>
  </div>
</nav>

<!-- ══════════════════════════════════════════════════
     MAIN
     ══════════════════════════════════════════════════ -->
<div class="page-layout">

  <!-- LEFT COLUMN -->
  <section class="left-col">

    <!-- Stat Row -->
    <div class="stat-grid">
      <div class="card stat-card accent">
        <div class="stat-label">Total Reports</div>
        <div class="stat-value" id="stat-total">--</div>
      </div>
      <div class="card stat-card critical">
        <div class="stat-label">Active</div>
        <div class="stat-value" id="stat-active">--</div>
      </div>
      <div class="card stat-card success">
        <div class="stat-label">Resolved</div>
        <div class="stat-value" id="stat-resolved">--</div>
      </div>
    </div>

    <!-- Active Reports -->
    <div>
      <div class="section-head">
        <span class="section-label">
          Active Reports
          <span class="section-badge" id="active-reports-count">0</span>
        </span>
        <span class="section-meta">
          <span class="live-dot"></span>
          LIVE_SYSTEM_FEED
        </span>
      </div>

      <div id="active-reports-list">
        <!-- Active reports injected here -->
      </div>
    </div>

    <!-- Past Reports -->
    <div>
      <div class="section-head">
        <span class="section-label">Past Reports</span>
        <div class="filter-row">
          <button class="filter-btn active">All</button>
          <button class="filter-btn">Resolved</button>
          <button class="filter-btn">Dismissed</button>
        </div>
      </div>

      <div class="past-table" id="past-reports-list">
        <!-- Past reports injected here -->
      </div>
    </div>

  </section>

  <!-- RIGHT COLUMN — DETAIL PANEL -->
  <aside class="right-col">
    <div class="card detail-panel" id="report-detail-empty" style="display: flex; align-items: center; justify-content: center; min-height: 400px; color: var(--text-muted);">
      Select a report to view details
    </div>

    <div class="card detail-panel" id="report-detail-panel" style="display: none;">
      <div class="detail-header">
        <span class="detail-header-title">Report Detail</span>
        <span class="detail-header-meta">OPERATIONAL_DATA // ARCHIVE</span>
      </div>
      <div class="detail-body">
        <div class="detail-map">
          <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuDlg1gbwnw0mQyh8tejwxvHAs6roRIzsxj96_yPxWBmOYxOqvtUqPe2ZJec6rgeWKMNb_DUfJ6eQ4WeRa1c2aHRxd5DV1r1mrIvPRTCdjmfuHDpVpAO2YI5B17K-wTDfLmoXuvgzZvC_9fs0N_NwQp-tAdNBzmQtMwo0KSAUaTUW3kaOKFijGznVtAHXI5xtjM5ZIkctE6fbSSTcTzJ57BVLzDCb8fsLggDIgFCxH2KN2yn_HIhyIwd008cszBKeGEyCLxCji12qQk" alt="Incident Map View" />
        </div>

        <div class="detail-ticket-row">
          <span class="detail-ticket-id" id="detail-ticket-id">TICKET_ID // ---</span>
        </div>

        <div class="detail-title" id="detail-title">---</div>
        <div class="detail-coords" id="detail-coords">GEO_LOC // ---</div>
        
        <div style="margin-top: 16px; display: grid; gap: 8px;">
          <div style="display: flex; gap: 8px; align-items: center;">
            <span class="mono-meta">TYPE:</span>
            <span id="detail-type" style="color: var(--text); font-weight: 500;">---</span>
          </div>
          <div style="display: flex; gap: 8px; align-items: center;">
            <span class="mono-meta">SEVERITY:</span>
            <span id="detail-severity" style="color: var(--text); font-weight: 500;">---</span>
          </div>
        </div>

        <p class="detail-desc" id="detail-desc" style="margin-top: 16px;">---</p>

        <div class="detail-actions" style="margin-top: auto; padding-top: 24px;">
          <button class="btn btn-ghost" id="detail-close-btn">Close</button>
        </div>
      </div>
    </div>
  </aside>

</div>

<script src="../../js/app.js"></script>
<script src="../../js/theme.js"></script>
<script src="../../js/user_reports.js"></script>

</body>
</html>
