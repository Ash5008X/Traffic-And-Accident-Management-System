<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexusTraffic | Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Figtree:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@300,0"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="css/auth/login.css" />
</head>
<body>
  <main class="auth-shell">
    <section class="auth-card" aria-label="Login form">
      <div class="brand-block">
        <span class="material-symbols-outlined brand-icon" aria-hidden="true">traffic</span>
        <h1>NEXUSTRAFFIC</h1>
        <p>Traffic &amp; Accident Management System</p>
      </div>

      <form class="auth-form" action="#" method="post">
        <div class="field-wrap">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="Enter your email" required />
        </div>

        <div class="field-wrap">
          <label for="password">Password</label>
          <div class="input-with-action">
            <input id="password" name="password" type="password" placeholder="Enter your password" required />
            <button class="inline-action" type="button" data-toggle="#password">
              <span class="material-symbols-outlined">visibility</span>
              Show
            </button>
          </div>
        </div>

        <div class="meta-row">
          <label class="remember-wrap">
            <input type="checkbox" id="remember" checked />
            <span>Remember me</span>
          </label>
          <a href="#">Forgot your password?</a>
        </div>

        <button class="primary-btn" type="submit">Login</button>

        <p class="switch-copy">
          Don't have an account?
          <a href="pages/register.html">Register</a>
        </p>
      </form>
    </section>
  </main>

  <script src="js/app.js"></script>
  <script src="js/login.js"></script>
  <script>
    document.querySelectorAll("[data-toggle]").forEach((button) => {
      button.addEventListener("click", () => {
        const target = document.querySelector(button.dataset.toggle);
        const isHidden = target.type === "password";
        target.type = isHidden ? "text" : "password";
        button.querySelector(".material-symbols-outlined").textContent = isHidden ? "visibility_off" : "visibility";
        button.lastChild.textContent = isHidden ? " Hide" : " Show";
      });
    });
  </script>
</body>
</html>
